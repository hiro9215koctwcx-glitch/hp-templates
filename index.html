<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HPテンプレート集</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    background: #f8fafc;
    color: #0f172a;
    line-height: 1.6;
  }
  .wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }
  header {
    text-align: center;
    margin-bottom: 3rem;
  }
  header h1 {
    margin: 0 0 0.5rem;
    font-size: clamp(1.75rem, 4vw, 2.25rem);
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  header p {
    margin: 0;
    font-size: 1.05rem;
    color: #64748b;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
  }
  @media (max-width: 900px) {
    .cards { grid-template-columns: 1fr; }
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 1.75rem;
    box-shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
    border: 1px solid #e2e8f0;
    display: flex;
    flex-direction: column;
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .card:hover {
    box-shadow: 0 12px 40px rgba(15, 23, 42, 0.12);
    transform: translateY(-2px);
  }
  .card-badge {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.25rem 0.6rem;
    border-radius: 999px;
    margin-bottom: 0.75rem;
    width: fit-content;
  }
  .card h2 {
    margin: 0 0 0.75rem;
    font-size: 1.25rem;
  }
  .card p {
    margin: 0 0 1.25rem;
    flex: 1;
    font-size: 0.95rem;
    color: #475569;
  }
  .card a {
    display: inline-block;
    text-align: center;
    padding: 0.85rem 1.25rem;
    border-radius: 10px;
    font-weight: 600;
    text-decoration: none;
    color: #fff;
    background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
    border: none;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }
  .card a:hover { opacity: 0.95; transform: scale(1.02); }
  .card.t1 .card-badge { background: #e0f2fe; color: #0369a1; }
  .card.t2 .card-badge { background: #fef3c7; color: #b45309; }
  .card.t2 a {
    background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
  }
  .card.t3 .card-badge { background: #ffedd5; color: #c2410c; }
  .card.t3 a {
    background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>HPテンプレート集</h1>
      <p>あなたのビジネスに合わせて、すぐ使えるHPテンプレート</p>
    </header>
    <div class="cards">
      <article class="card t1">
        <span class="card-badge">クリーン・ミニマル</span>
        <h2>テンプレート1</h2>
        <p>個人事業主・フリーランス向け。白ベースに水色のアクセントで、どんな業種にも馴染むすっきりしたデザインです。</p>
        <a href="template1.html">このテンプレを見る</a>
      </article>
      <article class="card t2">
        <span class="card-badge">プロフェッショナル・ダーク</span>
        <h2>テンプレート2</h2>
        <p>士業・コンサル・IT企業向け。紺とゴールドで信頼感と品格を表現したダークトーンのレイアウトです。</p>
        <a href="template2.html">このテンプレを見る</a>
      </article>
      <article class="card t3">
        <span class="card-badge">フレンドリー・カラフル</span>
        <h2>テンプレート3</h2>
        <p>飲食・美容・教室向け。オレンジと黄色で親しみやすさと活気を出した、明るい雰囲気のテンプレートです。</p>
        <a href="template3.html">このテンプレを見る</a>
      </article>
    </div>
  </div>
</body>
</html>
